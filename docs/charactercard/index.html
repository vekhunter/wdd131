<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="An interactive character card featuring a fantasy character with level progression and combat mechanics.">
    <meta name="keywords" content="character card, fantasy, game, interactive">
    <meta name="author" content="Your Name">
    
    <!-- Social Media Meta Tags -->
    <meta property="og:title" content="Character Card Game">
    <meta property="og:description" content="An interactive character card featuring a fantasy character with level progression and combat mechanics.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://andejuli.github.io/wdd131/character_card/snortleblat.webp">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Character Card Game">
    <meta name="twitter:description" content="An interactive character card featuring a fantasy character with level progression and combat mechanics.">
    <meta name="twitter:image" content="https://andejuli.github.io/wdd131/character_card/snortleblat.webp">
    
    <title>Character Card - WDD131</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Character Card</h1>
        
        <div class="card">
            <div class="card-image">
                <img id="character-image" src="https://andejuli.github.io/wdd131/character_card/snortleblat.webp" alt="Swamp Beast Diplomat">
            </div>
            
            <div class="card-content">
                <h2 id="character-name">Name</h2>
                
                <div class="stats">
                    <div class="stat">
                        <span class="label">Class:</span>
                        <span id="character-class" class="value">-</span>
                    </div>
                    <div class="stat">
                        <span class="label">Level:</span>
                        <span id="character-level" class="value">-</span>
                    </div>
                    <div class="stat">
                        <span class="label">Health:</span>
                        <span id="character-health" class="value">-</span>
                    </div>
                </div>
                
                <div class="health-bar">
                    <div id="health-fill" class="health-fill"></div>
                </div>
            </div>
            
            <div class="card-actions">
                <button id="attack-btn" class="btn btn-attack">Attack (-20 HP)</button>
                <button id="levelup-btn" class="btn btn-levelup">Level Up</button>
            </div>
        </div>
        
        <div id="message" class="message"></div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
