<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Ticket Form</title>
    <meta
      name="description"
      content="Event ticket registration form with conditional student and guest validation."
    >
    <meta name="author" content="Garrett Christensen">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="styles.css">
    <script src="eventform.js" defer></script>
  </head>
  <body>
    <main class="page">
      <section class="card">
        <h1>Event Ticket Registration</h1>
        <p class="intro">
          Register for the WDD 131 showcase event. Choose a future date, then
          identify yourself as a student or guest to unlock the required field.
        </p>

        <form id="eventForm" novalidate>
          <div class="field-grid">
            <div class="field">
              <label for="firstName">First Name</label>
              <input id="firstName" name="firstName" type="text" autocomplete="given-name" required>
            </div>

            <div class="field">
              <label for="lastName">Last Name</label>
              <input id="lastName" name="lastName" type="text" autocomplete="family-name" required>
            </div>

            <div class="field field-full">
              <label for="email">Email</label>
              <input id="email" name="email" type="email" autocomplete="email" required>
            </div>

            <div class="field">
              <label for="eventDate">Event Date</label>
              <input id="eventDate" name="eventDate" type="date" required>
              <p class="helper">Select a date later than today.</p>
            </div>

            <div class="field">
              <label for="attendeeType">Type</label>
              <select id="attendeeType" name="attendeeType" aria-controls="typeDetails" required>
                <option value="">Choose one</option>
                <option value="student">Student</option>
                <option value="guest">Guest</option>
              </select>
            </div>

            <div id="typeDetails" class="field field-full" hidden>
              <label for="typeInput" id="typeLabel">Student I#</label>
              <input id="typeInput" name="typeInput" type="text" inputmode="numeric">
              <p id="typeHelper" class="helper">Enter your 9 digit student I number.</p>
            </div>
          </div>

          <button type="submit">Reserve Ticket</button>
        </form>

        <section id="messages" class="messages" aria-live="polite" tabindex="-1"></section>
        <section id="ticket" class="ticket" aria-live="polite"></section>
      </section>
    </main>
  </body>
</html>
