<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 131 Ponder - Objects</title>
    <meta name="description" content="Week 8 ponder assignment for JavaScript objects and methods.">
    <meta name="author" content="Garrett Christensen">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="courses.css">
    <script src="courses.js" defer></script>
  </head>
  <body>
    <main class="wrapper">
      <h1 id="courseName"></h1>
      <h2 id="courseCode"></h2>

      <div class="enroll-controls">
        <label for="sectionNumber">Section Number</label>
        <input id="sectionNumber" type="number" min="1" step="1" placeholder="Enter section #">
        <button id="enrollStudent" type="button">Enroll Student</button>
      </div>
      <p id="enrollStatus" aria-live="polite"></p>

      <table>
        <thead>
          <tr>
            <th>Section#</th>
            <th>Room#</th>
            <th>#Enrolled</th>
            <th>Days</th>
            <th>Instructor</th>
          </tr>
        </thead>
        <tbody id="sections"></tbody>
      </table>
    </main>
  </body>
</html>
